{% set version = "4.1.1" %}

package:
  name: uritemplate
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/u/uritemplate/uritemplate-{{ version }}.tar.gz
  sha256: 4346edfc5c3b79f694bccd6d6099a322bbeb628dbf2cd86eea55a456ce5124f0

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - uritemplate
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://uritemplate.readthedocs.org
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Implementation of RFC 6570 URI Templates
  dev_url: http://github.com/uri-templates/uritemplate-py/

extra:
  recipe-maintainers:
    - pmlandwehr
    - ocefpaf
